<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS v1.3 Iron Man Edition</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,#07111f,#02060d 65%);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* rotating HUD ring */
.ring{
position:absolute;
width:420px;
height:420px;
border:2px solid rgba(56,189,248,.15);
border-radius:50%;
animation:spin 10s linear infinite;
box-shadow:0 0 40px rgba(56,189,248,.08);
}

.ring::before{
content:"";
position:absolute;
inset:18px;
border:2px dashed rgba(56,189,248,.18);
border-radius:50%;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.panel{
position:relative;
z-index:5;
width:100%;
max-width:760px;
padding:28px;
border-radius:24px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(14px);
border:1px solid rgba(56,189,248,.15);
text-align:center;
box-shadow:0 0 30px rgba(56,189,248,.08);
}

h1{
font-size:46px;
letter-spacing:5px;
color:#67e8f9;
text-shadow:0 0 15px rgba(103,232,249,.6);
}

.sub{
margin-top:8px;
color:#cbd5e1;
font-size:15px;
}

#status{
margin-top:18px;
font-size:20px;
min-height:28px;
color:#86efac;
}

.mic{
margin-top:18px;
width:95px;
height:95px;
border:none;
border-radius:50%;
cursor:pointer;
font-size:34px;
background:linear-gradient(135deg,#67e8f9,#38bdf8);
box-shadow:0 0 25px rgba(56,189,248,.55);
transition:.25s;
}

.mic:hover{
transform:scale(1.06);
}

.controls{
margin-top:14px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:11px 16px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
background:#38bdf8;
color:#000;
}

.log{
margin-top:18px;
height:160px;
overflow:auto;
text-align:left;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.04);
font-size:14px;
color:#dbeafe;
}

.log div{
margin-bottom:6px;
}

.footer{
margin-top:14px;
font-size:12px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="ring"></div>

<div class="panel">

<h1>JARVIS</h1>
<div class="sub">v1.3 Iron Man Edition • Voice Core Online</div>

<div id="status">Standby</div>

<button class="mic" onclick="toggleJarvis()">🎤</button>

<div class="controls">
<button class="btn" onclick="toggleJarvis()">START / STOP</button>
<button class="btn" onclick="speak('System online')">TEST</button>
<button class="btn" onclick="window.open('https://github.com','_blank')">GitHub</button>
</div>

<div class="log" id="log"></div>

<div class="footer">
50 Commands • Mobile + PC • Built by Ravinder Ozha
</div>

</div>

<script>
let recognition=null;
let isRunning=false;
let restarting=false;

function log(msg){
let box=document.getElementById("log");
box.innerHTML="<div>> "+msg+"</div>"+box.innerHTML;
}

function setStatus(txt){
document.getElementById("status").innerText=txt;
}

function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.rate=1;
msg.pitch=1;
speechSynthesis.speak(msg);
}

function openSite(url,name){
window.open(url,"_blank");
log("Opening "+name);
speak("Opening "+name);
}

const sites={
google:"https://google.com",
youtube:"https://youtube.com",
gmail:"https://gmail.com",
chatgpt:"https://chat.openai.com",
github:"https://github.com",
maps:"https://maps.google.com",
news:"https://news.google.com",
weather:"https://google.com/search?q=weather",
translate:"https://translate.google.com",
amazon:"https://amazon.in",
flipkart:"https://flipkart.com",
linkedin:"https://linkedin.com",
facebook:"https://facebook.com",
instagram:"https://instagram.com",
reddit:"https://reddit.com",
spotify:"https://spotify.com",
netflix:"https://netflix.com",
drive:"https://drive.google.com",
docs:"https://docs.google.com",
sheets:"https://docs.google.com/spreadsheets",
slides:"https://docs.google.com/presentation",
calendar:"https://calendar.google.com",
notes:"https://keep.google.com",
portfolio:"https://ravinderozha.github.io",
jobs:"https://linkedin.com/jobs",
naukri:"https://naukri.com",
indeed:"https://indeed.com",
stackoverflow:"https://stackoverflow.com",
openai:"https://openai.com",
x:"https://x.com",
whatsapp:"https://web.whatsapp.com",
canva:"https://canva.com",
booking:"https://booking.com",
zomato:"https://zomato.com",
swiggy:"https://swiggy.com",
uber:"https://uber.com",
ola:"https://olacabs.com",
irctc:"https://irctc.co.in",
imdb:"https://imdb.com",
wikipedia:"https://wikipedia.org",
cricket:"https://google.com/search?q=cricket+score",
stocks:"https://google.com/search?q=stock+market",
gold:"https://google.com/search?q=gold+price",
bitcoin:"https://google.com/search?q=bitcoin+price",
flight:"https://google.com/search?q=flight+status",
train:"https://google.com/search?q=train+status",
camera:"camera"
};

function runCommand(text){

text=text.toLowerCase().trim();
log("Heard: "+text);

if(!text.includes("jarvis")){
return;
}

let cmd=text.replace("jarvis","").trim();

if(cmd===""){
speak("Yes sir");
return;
}

if(cmd==="time"){
let t=new Date().toLocaleTimeString();
setStatus(t);
speak("Current time is "+t);
return;
}

if(cmd==="date"){
let d=new Date().toDateString();
setStatus(d);
speak("Today is "+d);
return;
}

if(cmd==="stop"){
toggleJarvis();
return;
}

if(cmd==="camera"){
speak("Camera access depends on browser permission");
return;
}

if(sites[cmd]){
openSite(sites[cmd],cmd);
setStatus("Executed: "+cmd);
}else{
setStatus("Unknown command");
speak("Command not found");
}
}

function buildRecognition(){

if(!('webkitSpeechRecognition' in window)){
alert("Use Chrome browser.");
return null;
}

let rec=new webkitSpeechRecognition();
rec.lang="en-US";
rec.continuous=true;
rec.interimResults=false;
rec.maxAlternatives=1;

rec.onstart=function(){
setStatus("Listening...");
log("Voice engine started");
};

rec.onresult=function(event){
let txt=event.results[event.results.length-1][0].transcript;
runCommand(txt);
};

rec.onerror=function(e){
log("Error: "+e.error);
};

rec.onend=function(){
log("Engine ended");

if(isRunning && !restarting){
restarting=true;
setTimeout(()=>{
restarting=false;
try{
recognition=buildRecognition();
recognition.start();
}catch(err){}
},600);
}
};

return rec;
}

function startJarvis(){

if(isRunning) return;

isRunning=true;
recognition=buildRecognition();

if(recognition){
recognition.start();
setStatus("Starting...");
speak("Jarvis online");
}
}

function stopJarvis(){

isRunning=false;

if(recognition){
try{recognition.stop();}catch(e){}
}

setStatus("Stopped");
log("System stopped");
speak("Jarvis offline");
}

function toggleJarvis(){
if(isRunning){
stopJarvis();
}else{
startJarvis();
}
}
</script>

</body>
</html>
