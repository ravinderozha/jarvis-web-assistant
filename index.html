<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AUTO LISTEN MODE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:linear-gradient(180deg,#02111f,#04233d,#05375c,#06527f);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.panel{
width:100%;
max-width:760px;
padding:28px;
border-radius:24px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.35);
}

h1{
font-size:42px;
color:#67e8f9;
}

.sub{
margin-top:8px;
color:#dbeafe;
}

#status{
margin:18px 0;
font-size:18px;
min-height:28px;
color:#86efac;
}

.mic{
width:100px;
height:100px;
border:none;
border-radius:50%;
font-size:34px;
cursor:pointer;
background:linear-gradient(135deg,#67e8f9,#38bdf8);
font-weight:bold;
transition:.3s;
}

.mic:hover{
transform:scale(1.06);
}

.stop{
margin-top:14px;
padding:12px 18px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-weight:bold;
cursor:pointer;
}

.commands{
margin-top:18px;
background:rgba(255,255,255,.05);
padding:12px;
border-radius:14px;
font-size:14px;
text-align:left;
height:120px;
overflow:auto;
}
</style>
</head>

<body>

<div class="panel">

<h1>JARVIS</h1>
<div class="sub">One Click Start • Always Listening in Background</div>

<button class="mic" onclick="toggleJarvis()">🎤</button>

<div id="status">Stopped</div>

<button class="stop" onclick="toggleJarvis()">START / STOP</button>

<div class="commands">
Say:<br>
Jarvis Google<br>
Jarvis YouTube<br>
Jarvis Gmail<br>
Jarvis ChatGPT<br>
Jarvis GitHub<br>
Jarvis Time<br>
Jarvis Date<br>
Jarvis Maps<br>
Jarvis News<br>
Jarvis Weather
</div>

</div>

<script>
let recognition;
let isRunning=false;

function speak(text){
let msg=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(msg);
}

function openSite(url){
window.open(url,'_blank');
}

const sites={
google:"https://google.com",
youtube:"https://youtube.com",
gmail:"https://gmail.com",
chatgpt:"https://chat.openai.com",
github:"https://github.com",
maps:"https://maps.google.com",
news:"https://news.google.com",
weather:"https://google.com/search?q=weather"
};

function executeCommand(text){

text=text.toLowerCase();

if(!text.includes("jarvis")) return;

let cmd=text.replace("jarvis","").trim();

document.getElementById("status").innerText="Heard: "+cmd;

if(cmd==="time"){
speak("Current time is " + new Date().toLocaleTimeString());
return;
}

if(cmd==="date"){
speak("Today is " + new Date().toDateString());
return;
}

if(sites[cmd]){
openSite(sites[cmd]);
speak("Opening " + cmd);
}else{
speak("Command not found");
}
}

function startRecognition(){

if(!('webkitSpeechRecognition' in window)){
alert("Use Chrome browser");
return;
}

recognition = new webkitSpeechRecognition();
recognition.lang="en-US";
recognition.continuous=true;
recognition.interimResults=false;

recognition.onstart=function(){
document.getElementById("status").innerText="Jarvis Running in Background...";
};

recognition.onresult=function(event){
let text=event.results[event.results.length-1][0].transcript;
executeCommand(text);
};

recognition.onerror=function(){
document.getElementById("status").innerText="Voice error...";
};

recognition.onend=function(){

if(isRunning){
recognition.start();   // Auto restart forever
}
};

recognition.start();
}

function stopRecognition(){

isRunning=false;

if(recognition){
recognition.stop();
}

document.getElementById("status").innerText="Stopped";
}

function toggleJarvis(){

if(isRunning){
stopRecognition();
}else{
isRunning=true;
startRecognition();
}
}
</script>

</body>
</html>
