<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Web Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
padding:35px;
border-radius:22px;
text-align:center;
box-shadow:0 0 30px rgba(56,189,248,0.15);
}

h1{
font-size:42px;
color:#38bdf8;
margin-bottom:10px;
}

.sub{
color:#cbd5e1;
margin-bottom:30px;
font-size:18px;
}

#status{
font-size:20px;
margin:20px 0;
color:#22c55e;
min-height:28px;
}

.mic{
width:90px;
height:90px;
border-radius:50%;
border:none;
background:#38bdf8;
font-size:32px;
cursor:pointer;
transition:0.3s;
}

.mic:hover{
transform:scale(1.08);
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.btn{
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#38bdf8;
color:black;
}

.footer{
margin-top:28px;
font-size:14px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>JARVIS</h1>
<p class="sub">Your AI Web Assistant</p>

<button class="mic" onclick="startListening()">🎤</button>

<div id="status">Ready for command...</div>

<div class="grid">

<button class="btn" onclick="openSite('https://google.com')">Google</button>

<button class="btn" onclick="openSite('https://youtube.com')">YouTube</button>

<button class="btn" onclick="openSite('https://chat.openai.com')">ChatGPT</button>

<button class="btn" onclick="openSite('https://github.com')">GitHub</button>

<button class="btn" onclick="speakTime()">Time</button>

<button class="btn" onclick="darkMode()">Mode</button>

</div>

<div class="footer">
Built by Ravinder Ozha • GitHub Pages Live Project
</div>

</div>

<script>
let dark=true;

function openSite(url){
window.open(url,'_blank');
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.rate=1;
msg.pitch=1;
speechSynthesis.speak(msg);
}

function speakTime(){
let now=new Date();
let t=now.toLocaleTimeString();
document.getElementById("status").innerText="Current time: "+t;
speak("Current time is "+t);
}

function darkMode(){
if(dark){
document.body.style.background="linear-gradient(135deg,#f8fafc,#e2e8f0,#cbd5e1)";
document.body.style.color="black";
dark=false;
}else{
document.body.style.background="linear-gradient(135deg,#020617,#0f172a,#111827)";
document.body.style.color="white";
dark=true;
}
}

function startListening(){

if(!('webkitSpeechRecognition' in window)){
alert("Voice recognition supported in Chrome browser.");
return;
}

let recognition=new webkitSpeechRecognition();
recognition.lang='en-US';
recognition.start();

document.getElementById("status").innerText="Listening...";

recognition.onresult=function(event){

let command=event.results[0][0].transcript.toLowerCase();

document.getElementById("status").innerText="You said: "+command;

if(command.includes("google")){
openSite("https://google.com");
speak("Opening Google");
}

else if(command.includes("youtube")){
openSite("https://youtube.com");
speak("Opening YouTube");
}

else if(command.includes("chatgpt")){
openSite("https://chat.openai.com");
speak("Opening Chat GPT");
}

else if(command.includes("github")){
openSite("https://github.com");
speak("Opening GitHub");
}

else if(command.includes("time")){
speakTime();
}

else{
speak("Command not recognized");
}

};

recognition.onerror=function(){
document.getElementById("status").innerText="Voice error. Try again.";
}

}
</script>

</body>
</html>
