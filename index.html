<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0a0f1a;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.wrap{
width:100%;
max-width:860px;
background:#111827;
border:1px solid #1f2937;
border-radius:22px;
padding:28px;
box-shadow:0 0 25px rgba(0,0,0,.45);
}

h1{
text-align:center;
font-size:48px;
letter-spacing:4px;
color:#38bdf8;
}

.sub{
text-align:center;
color:#94a3b8;
margin-top:6px;
font-size:14px;
}

#status{
margin-top:18px;
text-align:center;
font-size:20px;
color:#86efac;
min-height:28px;
}

.center{
display:flex;
justify-content:center;
margin-top:18px;
}

.mic{
width:96px;
height:96px;
border:none;
border-radius:50%;
cursor:pointer;
font-size:34px;
background:#38bdf8;
color:#000;
font-weight:bold;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

.btn{
padding:11px 16px;
border:none;
border-radius:10px;
background:#1f2937;
color:#fff;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
background:#38bdf8;
color:#000;
}

.notes{
margin-top:18px;
width:100%;
height:140px;
background:#0b1220;
color:#fff;
border:none;
border-radius:14px;
padding:12px;
resize:vertical;
}

.log{
margin-top:18px;
height:180px;
overflow:auto;
background:#0b1220;
border-radius:14px;
padding:12px;
font-size:14px;
color:#dbeafe;
}

.log div{
margin-bottom:6px;
}

.footer{
margin-top:14px;
text-align:center;
font-size:12px;
color:#64748b;
}
</style>
</head>

<body>

<div class="wrap">

<h1>JARVIS</h1>
<div class="sub">v2.3 Productivity Pack</div>

<div id="status">Ready</div>

<div class="center">
<button class="mic" onclick="toggleJarvis()">🎤</button>
</div>

<div class="controls">
<button class="btn" onclick="toggleJarvis()">START / STOP</button>
<button class="btn" onclick="clearLog()">CLEAR LOG</button>
<button class="btn" onclick="clearNotes()">CLEAR NOTES</button>
<button class="btn" onclick="copyNotes()">COPY NOTES</button>
</div>

<textarea id="notes" class="notes" placeholder="Jarvis Notes Pad..."></textarea>

<div class="log" id="log"></div>

<div class="footer">
Say: Jarvis joke • Jarvis Hindi joke • Jarvis play Arijit song • Jarvis notepad • Jarvis write in a doc
</div>

</div>

<script>
let recognition=null;
let running=false;
let restarting=false;
let manualStop=false;
let noteMode=false;

function $(id){ return document.getElementById(id); }

function log(msg){
$("log").innerHTML="<div>> "+msg+"</div>"+$("log").innerHTML;
}

function status(t){
$("status").innerText=t;
}

function clearLog(){
$("log").innerHTML="";
}

function clearNotes(){
$("notes").value="";
}

function copyNotes(){
$("notes").select();
document.execCommand("copy");
status("Notes copied");
}

function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.rate=1;
u.pitch=1;
speechSynthesis.speak(u);
}

function openSite(url,name){
window.open(url,"_blank");
log("Opening "+name);
status("Opened "+name);
}

const jokes = [
"Why don’t programmers like nature? It has too many bugs.",
"I told my computer I needed a break. It said no problem and froze.",
"Why was the laptop cold? It left its Windows open."
];

const hindiJokes = [
"टीचर: होमवर्क कहाँ है? छात्र: सर, नेट स्लो था इसलिए दिमाग डाउनलोड नहीं हुआ।",
"पत्नी: सुनो जी, मैं कैसी लग रही हूँ? पति: सिस्टम हैंग हो गया है।",
"दोस्त: पढ़ाई कैसी चल रही है? मैं: जैसे सरकारी काम।"
];

const sites={
google:"https://google.com",
youtube:"https://youtube.com",
gmail:"https://gmail.com",
chatgpt:"https://chat.openai.com",
github:"https://github.com"
};

function runCommand(text){

text=text.toLowerCase().trim();
log("Heard: "+text);

if(noteMode && !text.includes("jarvis")){
$("notes").value += text + "\n";
status("Writing...");
return;
}

if(!text.includes("jarvis")){
status("Waiting wake word...");
return;
}

let cmd=text.replace("jarvis","").trim();

if(cmd===""){
speak("Yes");
return;
}

if(cmd.includes("tell me a joke") || cmd==="joke"){
let j=jokes[Math.floor(Math.random()*jokes.length)];
speak(j);
status("Joke mode");
return;
}

if(cmd.includes("hindi joke") || cmd.includes("ek hindi joke")){
let j=hindiJokes[Math.floor(Math.random()*hindiJokes.length)];
speak(j);
status("Hindi Joke");
return;
}

if(cmd.startsWith("play")){
let song=cmd.replace("play","").trim();
if(song==="a song in youtube" || song==="song in youtube" || song==="song"){
song="latest songs";
}
openSite("https://www.youtube.com/results?search_query="+encodeURIComponent(song),"YouTube");
speak("Playing "+song);
return;
}

if(cmd==="notepad"){
noteMode=true;
status("Notes mode ON");
speak("Speak now. I am writing.");
return;
}

if(cmd==="stop notes"){
noteMode=false;
status("Notes mode OFF");
speak("Stopped writing");
return;
}

if(cmd==="write in a doc"){
openSite("https://docs.google.com/document/create","Google Docs");
speak("Opening document");
return;
}

if(cmd==="time"){
let t=new Date().toLocaleTimeString();
speak("Current time is "+t);
status(t);
return;
}

if(sites[cmd]){
openSite(sites[cmd],cmd);
speak("Opening "+cmd);
return;
}

status("Unknown command");
speak("Command not found");
}

function createRecognition(){

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SR){
alert("Use Chrome browser.");
return null;
}

let rec=new SR();
rec.lang="en-US";
rec.continuous=false;
rec.interimResults=false;
rec.maxAlternatives=1;

rec.onstart=function(){
status("Listening...");
};

rec.onresult=function(e){
let txt=e.results[0][0].transcript;
runCommand(txt);
};

rec.onerror=function(e){
log("Error: "+e.error);
};

rec.onend=function(){
if(manualStop) return;

if(running && !restarting){
restarting=true;
setTimeout(()=>{
restarting=false;
if(running) startRecognitionOnly();
},700);
}
};

return rec;
}

function startRecognitionOnly(){
try{
recognition=createRecognition();
if(recognition) recognition.start();
}catch(err){}
}

function startJarvis(){
if(running) return;
running=true;
manualStop=false;
status("Starting...");
speak("Jarvis online");
startRecognitionOnly();
}

function stopJarvis(){
running=false;
manualStop=true;
noteMode=false;

try{
if(recognition) recognition.stop();
}catch(err){}

status("Stopped");
speak("Jarvis offline");
}

function toggleJarvis(){
if(running) stopJarvis();
else startJarvis();
}
</script>

</body>
</html>
